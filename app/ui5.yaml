specVersion: "3.0"
metadata:
  name: com.coach.agent
type: application
framework:
  name: SAPUI5
  version: "1.120.18"
  libraries:
    - name: sap.m
    - name: sap.f
    - name: sap.ui.comp
    - name: sap.ui.layout
    - name: sap.ui.core
    - name: sap.ui.unified
    - name: sap.uxap
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      mountPath: /api/agent
      afterMiddleware: compression
      configuration:
        baseUri: "http://localhost:8080"
        strictSSL: false
